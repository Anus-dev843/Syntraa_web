# Web Service (Node) — NOT "Static Site".
#
# If you configure the service manually in the Render dashboard, you MUST set:
#   Build command:  npm install && npm run build
#   Start command:  npm run start
# Do NOT put "npm run start" in the Build field — you get "next: not found" (exit 127).
services:
  - type: web
    name: syntraa-web
    env: node
    plan: free
    autoDeploy: true
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 22.14.2
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      # Optional: only if Atlas data lives outside the default DB name "syntraa".
      - key: MONGODB_DB_NAME
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
